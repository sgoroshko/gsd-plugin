name: Check drift

on:
  push:
  pull_request:

jobs:
  file-layout:
    name: File-layout drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run file-layout drift detector
        run: node bin/maintenance/check-file-layout.cjs

  handoff-schema:
    name: HANDOFF schema validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dev dependencies
        run: npm ci
      - name: Validate HANDOFF schema
        run: node bin/maintenance/check-handoff-schema.cjs

  mcp-stdio-framing:
    name: MCP stdio framing (regression for #3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run MCP stdio ndjson framing regression test
        run: node tests/mcp-stdio-framing.test.cjs

  mcp-write-tools:
    name: MCP write-tools end-to-end (regression for #11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run MCP write-tools end-to-end test
        run: node tests/mcp-write-tools-end-to-end.test.cjs

  conventions:
    name: Convention derivation + conformance (Phase 10)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run conventions module test
        run: node tests/conventions.test.cjs

  user-docs-jargon:
    name: User-docs jargon ratchet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run user-docs jargon detector
        run: node bin/maintenance/check-user-docs-jargon.cjs
      - name: Run user-docs jargon discrimination test
        run: node tests/user-docs-jargon.test.cjs
